<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fundoGradiente" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="50%" stop-color="#9933ff"/>
      <stop offset="100%" stop-color="#4a0080"/>
    </linearGradient>
    <radialGradient id="brilhoSuave" cx="50%" cy="50%" r="55%">
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.20"/>
    </radialGradient>
    <clipPath id="circuloFoto">
      <circle cx="256" cy="256" r="190"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#fundoGradiente)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#brilhoSuave)"/>

  <circle cx="256" cy="256" r="200" fill="none" stroke="white" stroke-width="6" opacity="0.55"/>
  <circle cx="256" cy="256" r="190" fill="white" opacity="0.08"/>

  <g clip-path="url(#circuloFoto)">
    <image xlink:href="nossa-foto.jpeg"
           x="46" y="46"
           width="420" height="420"
           preserveAspectRatio="xMidYMid slice"/>
  </g>

  <text x="408" y="448" font-size="58"
        font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">❤️</text>
</svg>
